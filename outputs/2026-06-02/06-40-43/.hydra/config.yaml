retrieval:
  model_type: image
  model_name: ColpaliRetrieval
  class_path: retrieval.${retrieval.model_type}_retrieval.${retrieval.model_name}
  top_k: 10
  doc_key: doc_id
  text_question_key: question
  image_question_key: question
  r_text_key: text-top-${retrieval.top_k}-${retrieval.text_question_key}
  r_image_key: image-top-${retrieval.top_k}-${retrieval.image_question_key}
  r_mix_key: mix-top-${retrieval.top_k}-${retrieval.mix_question_key}
  r_text_index_key: text-index-path-${retrieval.text_question_key}
  cuda_visible_devices: '1'
  embed_dir: ./tmp/${retrieval.model_name}/${retrieval.image_question_key}
  batch_size: 2
run-name: top4_original_only__anchored_artifact_activation_probe_top30_matrix
dataset:
  top_k: 1
  name: MMLongBench
  question_key: question
  gt_key: answer
  page_id_key: page_ids
  truncate_len: null
  max_page: 1000
  max_character_per_page: 100000
  use_mix: false
  r_text_key: ${retrieval.r_text_key}
  r_image_key: ${retrieval.r_image_key}
  r_mix_key: ${retrieval.r_mix_key}
  data_dir: ./data/${dataset.name}
  result_dir: ./results/${dataset.name}/${run-name}
  extract_path: ./tmp/${dataset.name}
  document_path: ./data/${dataset.name}/documents
  sample_path: ${dataset.data_dir}/samples.json
  sample_with_retrieval_path: ${dataset.data_dir}/sample-with-retrieval-results.json
mdoc_agent:
  cuda_visible_devices: 1,2
  truncate_len: null
  save_freq: 10
  num_workers: 3
  max_retries: 5
  ans_key: ans_${run-name}
  save_message: false
  agents:
  - agent: image_agent
    model: qwen3vl
  - agent: text_agent
    model: qwen3
  - agent: general_agent
    model: qwen3vl
  sum_agent:
    agent: sum_agent
    model: qwen3vl
eval_agent:
  truncate_len: null
  ans_key: ans_${run-name}
  agent: base
  model: deepseekv3
